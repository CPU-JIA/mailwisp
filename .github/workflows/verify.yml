name: Verify MailWisp

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - docs/research-foundation

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-full:
    name: Linux full verification
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GOTOOLCHAIN: go1.26.5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install pinned Docker Compose
        shell: bash
        run: ./scripts/install-compose-linux.sh

      - name: Install pinned PostgreSQL 18.4 client
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            --output /tmp/postgresql.asc
          fingerprint="$(gpg --show-keys --with-colons /tmp/postgresql.asc | awk -F: '$1 == "fpr" { print $10; exit }')"
          test "$fingerprint" = "B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8"
          sudo install -d -m 0755 /etc/apt/keyrings
          gpg --dearmor < /tmp/postgresql.asc | sudo tee /etc/apt/keyrings/postgresql.gpg > /dev/null
          echo 'deb [signed-by=/etc/apt/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt noble-pgdg main' \
            | sudo tee /etc/apt/sources.list.d/postgresql.list > /dev/null
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client-18=18.4-1.pgdg24.04+1
          echo '/usr/lib/postgresql/18/bin' >> "$GITHUB_PATH"
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          pg_dump --version
          pg_restore --version

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.20.0
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            spikes/frontend/package-lock.json

      - name: Install pinned verification tools
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          npm install --global npm@11.15.0

      - name: Install Playwright browser dependencies
        working-directory: spikes/frontend
        shell: bash
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run repository verification gate
        shell: pwsh
        run: ./scripts/verify.ps1

      - name: Upload production E2E evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/production-e2e/result.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload disaster recovery evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disaster-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/disaster-recovery/result.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/production-e2e
            artifacts/disaster-recovery
            web/playwright-report
            web/test-results
            web/playwright-production-report
            web/test-results-production
            spikes/frontend/playwright-report
            spikes/frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Postfix failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postfix-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/postfix-integration
          if-no-files-found: ignore
          retention-days: 7

  windows-native:
    name: Windows native Go verification
    runs-on: windows-2025
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: go1.26.5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Go format check
        shell: pwsh
        run: |
          go fmt ./...
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "whitespace check failed" }
          if (git status --porcelain) { throw "go fmt changed tracked files" }

      - name: Native tests
        shell: pwsh
        run: go test ./...

      - name: Native race tests
        shell: pwsh
        run: go test -race ./...

      - name: Native vet
        shell: pwsh
        run: go vet ./...
