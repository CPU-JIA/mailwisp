services:
  app:
    ports:
      - "127.0.0.1:${MAILWISP_BENCH_HTTP_PORT:-18080}:8080"
      - "127.0.0.1:${MAILWISP_BENCH_LMTP_PORT:-25250}:2525"
    environment:
      MAILWISP_CREATE_RATE_PER_MINUTE: "10000"
      MAILWISP_CREATE_RATE_BURST: "10000"
      MAILWISP_CREATE_DAILY_LIMIT: "1000000"
      MAILWISP_INBOX_MAX_MESSAGES: "5000"
