name: mailwisp

x-app-build: &app-build
  context: ../..
  dockerfile: deploy/compose/Dockerfile
  target: app

x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-environment: &app-environment
  MAILWISP_HTTP_ADDR: ":8080"
  MAILWISP_LMTP_ADDR: ":2525"
  MAILWISP_POSTGRES_DSN: postgres://mailwisp_app@postgres:5432/mailwisp?sslmode=disable
  MAILWISP_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_app_password
  MAILWISP_BROWSER_SESSION_KEY_FILE: /run/secrets/browser_session_key
  MAILWISP_CONTENT_ROOT: /var/lib/mailwisp/content

services:
  postgres:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailwisp
      POSTGRES_USER: mailwisp_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_owner_password
    secrets:
      - postgres_owner_password
    volumes:
      - postgres_data:/var/lib/postgresql
    tmpfs:
      - /run/postgresql:size=16m,mode=0770
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailwisp_owner -d mailwisp"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - database
    stop_grace_period: 60s
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2.0"

  db-provision:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    entrypoint: ["/bin/sh", "/usr/local/bin/mailwisp-provision-runtime-role"]
    user: postgres
    environment:
      POSTGRES_DB: mailwisp
      POSTGRES_USER: mailwisp_owner
      PGHOST: postgres
      PGPORT: "5432"
      PGSSLMODE: disable
      MAILWISP_POSTGRES_OWNER_PASSWORD_FILE: /run/secrets/postgres_owner_password
      MAILWISP_POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
    secrets:
      - postgres_owner_password
      - postgres_app_password
    volumes:
      - ./postgres/provision-runtime-role.sh:/usr/local/bin/mailwisp-provision-runtime-role:ro
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - database
    restart: "no"
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 96m
          cpus: "1.0"
          pids: 64

  migrate:
    image: mailwisp/app:${MAILWISP_IMAGE_TAG:-local}
    build: *app-build
    command: ["migrate"]
    environment:
      <<: *app-environment
      MAILWISP_POSTGRES_DSN: postgres://mailwisp_owner@postgres:5432/mailwisp?sslmode=disable
      MAILWISP_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_owner_password
      MAILWISP_BROWSER_SESSION_KEY_FILE: ""
    secrets:
      - postgres_owner_password
    depends_on:
      db-provision:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - database
    restart: "no"
    logging: *bounded-logging

  app:
    image: mailwisp/app:${MAILWISP_IMAGE_TAG:-local}
    build: *app-build
    restart: unless-stopped
    env_file:
      - path: ${MAILWISP_ENV_FILE:-./mailwisp.env}
        required: true
    environment:
      <<: *app-environment
      MAILWISP_PUBLIC_DOMAINS: ${MAILWISP_PUBLIC_DOMAINS:?set MAILWISP_PUBLIC_DOMAINS}
      MAILWISP_LMTP_MAX_MESSAGE_BYTES: ${MAILWISP_LMTP_MAX_MESSAGE_BYTES:?set MAILWISP_LMTP_MAX_MESSAGE_BYTES}
      MAILWISP_CREATE_QUOTA_HMAC_KEY_FILE: /run/secrets/create_quota_hmac_key
    secrets:
      - postgres_app_password
      - browser_session_key
      - create_quota_hmac_key
    volumes:
      - content_data:/var/lib/mailwisp/content
    tmpfs:
      - /tmp:size=32m,mode=1777
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - database
      - lmtp
      - frontend
    stop_grace_period: 30s
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "2.0"
          pids: 256

  maintenance:
    image: mailwisp/maintenance:${MAILWISP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
      target: maintenance
    profiles: ["maintenance"]
    command: ["maintenance-command-required"]
    environment:
      MAILWISP_POSTGRES_DSN: postgres://mailwisp_owner@postgres:5432/mailwisp?sslmode=disable
      MAILWISP_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_owner_password
      MAILWISP_CONTENT_ROOT: /var/lib/mailwisp/content
    secrets:
      - postgres_owner_password
    volumes:
      - content_data:/var/lib/mailwisp/content
      - ${MAILWISP_BACKUP_ROOT_SOURCE:-./backups}:/backups
    tmpfs:
      - /tmp:size=32m,mode=1777
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - database
    restart: "no"
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "2.0"
          pids: 256

  edge:
    image: mailwisp/edge:${MAILWISP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
      target: edge
    restart: unless-stopped
    environment:
      MAILWISP_WEB_DOMAIN: ${MAILWISP_WEB_DOMAIN:?set MAILWISP_WEB_DOMAIN}
      MAILWISP_CERT_NAME: ${MAILWISP_CERT_NAME:?set MAILWISP_CERT_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - acme_webroot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0755
      - /var/run:size=4m,mode=0755
      - /etc/nginx/conf.d:size=4m,mode=0755
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1/readyz"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 96m
          cpus: "1.0"
          pids: 128

  postfix:
    image: mailwisp/postfix:${MAILWISP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/compose/postfix/Dockerfile
    restart: unless-stopped
    environment:
      MAILWISP_SMTP_HOST: ${MAILWISP_SMTP_HOST:?set MAILWISP_SMTP_HOST}
      MAILWISP_PUBLIC_DOMAINS: ${MAILWISP_PUBLIC_DOMAINS:?set MAILWISP_PUBLIC_DOMAINS}
      MAILWISP_LMTP_MAX_MESSAGE_BYTES: ${MAILWISP_LMTP_MAX_MESSAGE_BYTES:?set MAILWISP_LMTP_MAX_MESSAGE_BYTES}
      MAILWISP_CERT_NAME: ${MAILWISP_CERT_NAME:?set MAILWISP_CERT_NAME}
    ports:
      - "25:25"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - postfix_queue:/var/spool/postfix
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "postfix status && nc -z -w 3 app 2525"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - lmtp
      - smtp_ingress
    stop_grace_period: 60s
    logging: *bounded-logging
    deploy:
      resources:
        limits:
          memory: 192m
          cpus: "1.0"
          pids: 256

  certbot:
    image: certbot/certbot:v5.6.0@sha256:0107d084c225631fc64a8313e19adb07275f7296fde338f7dfa93986c80b2e3e
    profiles: ["tools"]
    ports:
      - "80:80"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - acme_webroot:/var/www/certbot
    networks:
      - frontend
    logging: *bounded-logging

secrets:
  postgres_owner_password:
    file: ${MAILWISP_POSTGRES_OWNER_PASSWORD_FILE_SOURCE:-./secrets/postgres_owner_password.txt}
  postgres_app_password:
    file: ${MAILWISP_POSTGRES_APP_PASSWORD_FILE_SOURCE:-./secrets/postgres_app_password.txt}
  browser_session_key:
    file: ${MAILWISP_BROWSER_SESSION_KEY_FILE_SOURCE:-./secrets/browser_session_key.txt}
  create_quota_hmac_key:
    file: ${MAILWISP_CREATE_QUOTA_HMAC_KEY_FILE_SOURCE:-./secrets/create_quota_hmac_key.txt}

volumes:
  postgres_data:
  content_data:
  postfix_queue:
  letsencrypt:
  acme_webroot:

networks:
  database:
    internal: true
  lmtp:
    internal: true
  frontend:
  smtp_ingress:
