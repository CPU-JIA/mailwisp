name: mailwisp-backup-verifier

services:
  backup-verifier:
    image: mailwisp/maintenance:${MAILWISP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
      target: maintenance
    command: ["backup", "verify", "/backups/invalid-bundle"]
    volumes:
      - ${MAILWISP_BACKUP_ROOT_SOURCE:-./backups}:/backups:ro
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "1.0"
          pids: 64
