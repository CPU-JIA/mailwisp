misconfigurations:
  - id: AVD-DS-0002
    paths:
      - "deploy/compose/postfix/Dockerfile"
    expired_at: 2027-01-17
    statement: >-
      Postfix master must start as root to bind port 25, initialize its queue and
      chroot, then drop delivery work to dedicated Postfix users. The container
      has no Docker socket, uses no-new-privileges, and is isolated from the
      frontend and PostgreSQL networks. Re-evaluate before the expiry date.
